<svg xmlns="http://w3.org" width="${STABLE_TOTAL_W}" height="28">
  <g shape-rendering="crispEdges">
    <rect width="90" height="28" fill="#555555"/>
    <rect x="90" width="${STABLE_RIGHT_W}" height="28" fill="#007ec6"/>
  </g>
  <g fill="#ffffff" text-anchor="middle" font-family="DejaVu Sans,Verdana,Geneva,sans-serif" font-weight="bold" font-size="10" letter-spacing="1.5">
    <text x="45" y="17.5" fill="#010101" fill-opacity=".3">STABLE</text>
    <text x="45" y="16.5">STABLE</text>
    <text x="${STABLE_TEXT_X}" y="17.5" fill="#010101" fill-opacity=".3" textLength="${STABLE_TEXT_L}">${STABLE_UPPER}</text>
    <text x="${STABLE_TEXT_X}" y="16.5" textLength="${STABLE_TEXT_L}">${STABLE_UPPER}</text>
  </g>
</svg>
