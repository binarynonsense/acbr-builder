<svg xmlns="http://w3.org" width="${STABLE_TOTAL_W}" height="28">
  <g shape-rendering="crispEdges">
    <rect width="90" height="28" fill="#555555"/>
    <rect x="90" width="${STABLE_RIGHT_W}" height="28" fill="${STABLE_COLOR}"/>
  </g>
  <g fill="#ffffff" text-anchor="middle" font-family="DejaVu Sans,Verdana,Geneva,sans-serif" font-weight="bold" font-size="11" letter-spacing="1.5">
    <text x="45" y="18">STABLE</text>
    <text x="${STABLE_TEXT_X}" y="18" textLength="${STABLE_TEXT_L}">${STABLE_UPPER}</text>
  </g>
</svg>
